baseURL = "https://s3r4ph1el.github.io/"
title = "S3r4ph1el"
theme = "blowfish"
paginate = 10
enableRobotsTXT = true

defaultContentLanguage = "pt"
defaultContentLanguageInSubdir = false

[languages]
  [languages.pt]
    languageCode = "pt-BR"
    weight = 1
    [languages.pt.params]
      displayName = "PT"
  [languages.en]
    languageCode = "en-US"
    weight = 2
    [languages.en.params]
      displayName = "EN"

[params]
  colorScheme = "custom"        # uses our custom.css overrides
  defaultAppearance = "dark"    # always dark
  autoSwitchAppearance = false  # never switch to light

  description = "Offensive Security | CTF | Labs"
  enableSearch = true
  enableCodeCopy = true
  mainSections = ["blog", "projects"]

  [params.homepage]
    layout = "profile"          # centered profile card on homepage
    showRecent = true
    recentLimit = 5

  [params.author]
    name = "S3r4ph1el"
    headline = "Offensive Security Analyst"
    bio = ""
    links = [
      { github = "https://github.com/S3r4ph1el" },
      { linkedin = "https://linkedin.com/in/enzo-teles" },
    ]

  [params.article]
    showDate = true
    showReadingTime = true
    showTableOfContents = true
    showTaxonomies = true
    showWordCount = false
    sharingLinks = []

  [params.list]
    showBreadcrumbs = false
    showTableOfContents = false
    showSummary = true
    groupByYear = true

[taxonomies]
  tag = "tags"
  category = "categories"
  platform = "platform"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = true
    lineNumbersInTable = false
    noClasses = false
